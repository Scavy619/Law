Lawyer:
  type: object
  properties:
    _id:
      type: string
      example: "64f1a2b3c4d5e6f7a8b9c0d2"
    name:
      type: string
      example: "Jane Smith"
    email:
      type: string
      format: email
      example: "jane@lawfirm.com"
    image:
      type: string
      format: uri
      example: "https://res.cloudinary.com/example/lawyer.png"
    speciality:
      type: string
      example: "Criminal Law"
    degree:
      type: string
      example: "LLB"
    experience:
      type: string
      example: "5 Years"
    about:
      type: string
      example: "Experienced criminal lawyer with 5 years of practice."
    available:
      type: boolean
      example: true
    fees:
      type: number
      example: 500
    address:
      type: object
      properties:
        Location:
          type: string
        City:
          type: string
        State:
          type: string
    slots_booked:
      type: object
      additionalProperties:
        type: array
        items:
          type: string
