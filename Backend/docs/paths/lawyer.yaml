/lawyer/login:
  post:
    summary: Lawyer login
    tags:
      - Lawyers
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - password
            properties:
              email:
                type: string
                format: email
                example: "jane@lawfirm.com"
              password:
                type: string
                example: "LawyerPass@123"
    responses:
      "200":
        description: Lawyer logged in successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                accessToken:
                  type: string
                lawyer:
                  $ref: '../schemas/lawyer.schema.yaml#/Lawyer'
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "401":
        description: Invalid password
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "404":
        description: Lawyer not found
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/lawyer/refresh:
  post:
    summary: Refresh lawyer access token using cookie
    tags:
      - Lawyers
    responses:
      "200":
        description: New access token issued
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                accessToken:
                  type: string
                lawyer:
                  $ref: '../schemas/lawyer.schema.yaml#/Lawyer'
      "401":
        description: Refresh token missing or invalid
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "404":
        description: Lawyer not found
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/lawyer/logout:
  post:
    summary: Lawyer logout (clears lawyer refresh token cookie)
    tags:
      - Lawyers
    responses:
      "200":
        description: Lawyer logged out successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/lawyer/list:
  get:
    summary: Get all available lawyers (public)
    tags:
      - Lawyers
    responses:
      "200":
        description: List of lawyers
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                lawyers:
                  type: array
                  items:
                    $ref: '../schemas/lawyer.schema.yaml#/Lawyer'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/lawyer/profile:
  get:
    summary: Get authenticated lawyer's profile
    tags:
      - Lawyers
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Lawyer profile data
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                profileData:
                  $ref: '../schemas/lawyer.schema.yaml#/Lawyer'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "404":
        description: Lawyer not found
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/lawyer/update-profile:
  patch:
    summary: Update authenticated lawyer's profile
    tags:
      - Lawyers
    security:
      - bearerAuth: []
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              fees:
                type: number
                example: 600
              about:
                type: string
              available:
                type: boolean
              address:
                type: object
                properties:
                  Location:
                    type: string
                  City:
                    type: string
                  State:
                    type: string
    responses:
      "200":
        description: Profile updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                lawyer:
                  $ref: '../schemas/lawyer.schema.yaml#/Lawyer'
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "404":
        description: Lawyer not found
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/lawyer/dashboard:
  get:
    summary: Get lawyer dashboard stats and latest appointments
    tags:
      - Lawyers
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Lawyer dashboard data
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                dashData:
                  type: object
                  properties:
                    earnings:
                      type: number
                    appointments:
                      type: integer
                    patients:
                      type: integer
                    latestAppointments:
                      type: array
                      items:
                        $ref: '../schemas/appointment.schema.yaml#/Appointment'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/lawyer/appointments:
  get:
    summary: Get all appointments for the authenticated lawyer
    tags:
      - Lawyers
    security:
      - bearerAuth: []
    responses:
      "200":
        description: List of lawyer appointments
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                appointments:
                  type: array
                  items:
                    $ref: '../schemas/appointment.schema.yaml#/Appointment'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/lawyer/cancel-appointment:
  post:
    summary: Cancel an appointment (lawyer only)
    tags:
      - Lawyers
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - appointmentId
            properties:
              appointmentId:
                type: string
                example: "64f1a2b3c4d5e6f7a8b9c0d3"
    responses:
      "200":
        description: Appointment cancelled by lawyer
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
      "400":
        description: Already cancelled
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "403":
        description: Forbidden — not the lawyer's appointment
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "404":
        description: Appointment not found
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/lawyer/complete-appointment:
  post:
    summary: Mark an appointment as completed (lawyer only)
    tags:
      - Lawyers
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - appointmentId
            properties:
              appointmentId:
                type: string
                example: "64f1a2b3c4d5e6f7a8b9c0d3"
    responses:
      "200":
        description: Appointment marked as completed
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
      "400":
        description: Already completed or validation error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "403":
        description: Forbidden — not the lawyer's appointment
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "404":
        description: Appointment not found
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/lawyer/change-availability:
  post:
    summary: Toggle own availability (lawyer only)
    tags:
      - Lawyers
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Availability toggled
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: "Lawyer is now available"
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "404":
        description: Lawyer not found
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
