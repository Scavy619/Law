/document/upload:
  post:
    summary: Upload a legal document for AI analysis
    description: Upload PDF, DOCX, TXT, or image files. Files are stored in Cloudinary and processed by the RAG chatbot for user-specific Q&A.
    tags:
      - Documents
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - file
            properties:
              file:
                type: string
                format: binary
                description: Legal document file (PDF, DOCX, TXT, JPG, PNG). Max size 10MB.
    responses:
      "201":
        description: Document uploaded and processed successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: "Document uploaded and processed successfully"
                document:
                  type: object
                  properties:
                    _id:
                      type: string
                    userId:
                      type: string
                    filename:
                      type: string
                    fileType:
                      type: string
                      example: "pdf"
                    fileSize:
                      type: number
                      example: 2048576
                    cloudinaryUrl:
                      type: string
                      format: uri
                    status:
                      type: string
                      example: "processed"
                    chunksStored:
                      type: number
                      example: 45
                    namespace:
                      type: string
                      example: "user-uploads-abc123"
                    uploadedAt:
                      type: string
                      format: date-time
      "400":
        description: Validation error (invalid file type, size exceeded, or daily limit reached)
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "413":
        description: File too large (max 10MB)
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "429":
        description: Daily upload limit exceeded (5 documents per day)
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error or document processing failed
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/document:
  get:
    summary: Get all uploaded documents for authenticated user
    description: Returns a list of all documents uploaded by the user with metadata
    tags:
      - Documents
    security:
      - bearerAuth: []
    responses:
      "200":
        description: List of user documents
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                documents:
                  type: array
                  items:
                    type: object
                    properties:
                      _id:
                        type: string
                      filename:
                        type: string
                      fileType:
                        type: string
                      fileSize:
                        type: number
                      cloudinaryUrl:
                        type: string
                        format: uri
                      status:
                        type: string
                        enum: [pending, processing, processed, failed]
                      chunksStored:
                        type: number
                      uploadedAt:
                        type: string
                        format: date-time
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
