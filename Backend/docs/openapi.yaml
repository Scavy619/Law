      description: >
        Upload PDF, DOCX, TXT, or image files for AI-powered legal document analysis.
        Documents are stored in user-specific Pinecone namespaces for hybrid RAG queries.
        Maximum file size: 10MB. Rate limited to 10 uploads per hour.
      tags: [Documents]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Legal document file (PDF, DOCX, TXT, PNG, JPG, JPEG)
      responses:
        "201":
          description: Document uploaded and processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Document uploaded successfully"
                  document:
                    type: object
                    properties:
                      id:
                        type: string
                      filename:
                        type: string
                      fileType:
                        type: string
                      fileSize:
                        type: integer
                      uploadedAt:
                        type: string
                        format: date-time
        "400":
          description: Invalid file type or size exceeds limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "429":
          description: Rate limit exceeded (10 uploads per hour)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error during upload or processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /document:
    get:
      summary: Get all uploaded documents for the authenticated user
      description: Returns a list of all documents uploaded by the user with metadata
      tags: [Documents]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of user documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  documents:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        filename:
                          type: string
                        fileType:
                          type: string
                        fileSize:
                          type: integer
                        uploadedAt:
                          type: string
                          format: date-time
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── OAuth & Magic Link ──────────────────────────────────────────────────────

  /user/google:
    get:
      summary: Initiate Google OAuth 2.0 login
      description: >
        Redirects to Google OAuth consent screen with PKCE security.
        State and code verifier stored in secure HTTP-only cookies.
      tags: [Users]
      responses:
        "302":
          description: Redirect to Google OAuth consent screen
        "500":
          description: Failed to initiate Google authentication
          content:
            text/html:
              schema:
                type: string

  /user/google/callback:
    get:
      summary: Google OAuth callback handler
      description: >
        Handles OAuth callback, exchanges authorization code for tokens,
        creates or updates user account, and redirects to frontend with one-time code.
      tags: [Users]
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
          description: Authorization code from Google
        - in: query
          name: state
          required: true
          schema:
            type: string
          description: CSRF protection state parameter
      responses:
        "302":
          description: Redirect to frontend with one-time code
        "400":
          description: Invalid or expired OAuth state or missing PKCE verifier
          content:
            text/html:
              schema:
                type: string
        "500":
          description: Google authentication failed
          content:
            text/html:
              schema:
                type: string

  /user/google/exchange:
    post:
      summary: Exchange one-time code for access and refresh tokens
      description: >
        Frontend exchanges the one-time code received from OAuth callback
        for actual JWT access and refresh tokens.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: One-time code from OAuth callback redirect
      responses:
        "200":
          description: Tokens exchanged successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  accessToken:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        "400":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/magic-link:
    post:
      summary: Request magic link for passwordless login
      description: >
        Sends a time-limited magic link to user's email (15-minute expiry, single-use).
        Rate limited to 3 requests per hour per user.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: "john@example.com"
      responses:
        "200":
          description: Magic link sent to email
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Magic link sent! Check your email."
        "400":
          description: Validation error or Google user attempting magic link
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Email not verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "429":
          description: Rate limit exceeded (3 requests per hour)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/verify-magic-link/{token}:
    get:
      summary: Verify magic link token and authenticate user
      description: >
        Validates magic link token and returns access token with refresh cookie.
        Token expires in 15 minutes and is single-use only.
      tags: [Users]
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
          description: Magic link token from email
      responses:
        "200":
          description: Magic link verified, user authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  accessToken:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        "400":
          description: Invalid or expired magic link token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── Messages ────────────────────────────────────────────────────────────────

  /message/get-message:
    post:
      summary: Send a message to the RAG chatbot and get a response
      description: >
        Sends a user message to the AI legal chatbot within a session.
        Requires available credits. Credits are decremented per request.
        Rate limited to 30 requests per minute per user.
      tags: [Messages]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, message]
              properties:
                sessionId:
                  type: string
                  example: "session_abc123"
                message:
                  type: stringOAS 3.0

                  example: "What are my rights as a tenant?"
      responses:
        "200":
          description: Chatbot response returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  response:
                    type: object
                    properties:
                      role:
                        type: string
                        example: "assistant"
                      content:
                        type: string
                  creditsRemaining:
                    type: integer
                    example: 7
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "402":
          description: Insufficient credits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "429":
          description: Rate limit exceeded (30 messages per minute)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── Video ───────────────────────────────────────────────────────────────────

  /video/get-token:
    post:
      summary: Get Stream video token and call details for an appointment
      description: >
        Generates a Stream.io token for joining a video call.
        Accessible by both the user and lawyer of the appointment.
        Requires a paid, non-cancelled appointment within the valid join window
        (15 minutes before slot start up to 10 minutes after slot end).
        Rate limited to 5 requests per 5 minutes per user.
      tags: [Video]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [appointmentId]
              properties:
                appointmentId:
                  type: string
      responses:
        "200":
          description: Stream token and call details returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  token:
                    type: string
                    description: Stream.io user token
                  callId:
                    type: string
                  apiKey:
                    type: string
                  userId:
                    type: string
        "400":
          description: Appointment cancelled or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized or token invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Not a participant, unpaid, call ended, or outside join window
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Appointment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /video/update-status:
    post:
      summary: Update video call status (join / leave / end)
      description: >
        Updates the call status for a participant action.
        join marks participant as joined and starts the call timer on first join.
        leave marks participant as left and ends the call when both have left.
        end force-ends the call immediately.
        Rate limited to 20 requests per minute per user.
      tags: [Video]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [appointmentId, action]
              properties:
                appointmentId:
                  type: string
                action:
                  type: string
                  enum: [join, leave, end]
                  example: "join"
      responses:
        "200":
          description: Call status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Appointment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /video/call-details/{appointmentId}:
    get:
      summary: Get video call details for an appointment
      tags: [Video]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: appointmentId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Call details returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  callDetails:
                    type: object
                    properties:
                      callId:
                        type: string
                        nullable: true
                      roomId:
                        type: string
                        nullable: true
                      status:
                        type: string
                        enum: [not_started, in_progress, completed, missed]
                      startedAt:
                        type: string
                        format: date-time
                        nullable: true
                      endedAt:
                        type: string
                        format: date-time
                        nullable: true
                      duration:
                        type: integer
                      userJoined:
                        type: boolean
                      lawyerJoined:
                        type: boolean
                  canJoin:
                    type: boolean
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Not a participant of this appointment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Appointment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
