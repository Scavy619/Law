/user/signup:
  post:
    summary: Register a new user
    tags:
      - Users
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - name
              - email
              - password
            properties:
              name:
                type: string
                example: "John Doe"
              email:
                type: string
                format: email
                example: "john@example.com"
              password:
                type: string
                example: "StrongPass@123"
    responses:
      "201":
        description: Signup successful, verification email sent
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: "Signup successful. Please verify your email."
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "409":
        description: User already exists
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/user/login:
  post:
    summary: Login user
    tags:
      - Users
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - password
            properties:
              email:
                type: string
                format: email
                example: "john@example.com"
              password:
                type: string
                example: "StrongPass@123"
              twoFactorCode:
                type: string
                description: Required only if 2FA is enabled
                example: "123456"
    responses:
      "200":
        description: Login successful or 2FA required
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  properties:
                    success:
                      type: boolean
                      example: true
                    accessToken:
                      type: string
                    user:
                      $ref: '../schemas/user.schema.yaml#/User'
                - type: object
                  properties:
                    success:
                      type: boolean
                      example: true
                    requires2FA:
                      type: boolean
                      example: true
                    message:
                      type: string
                      example: "2FA code required"
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "401":
        description: Invalid password or 2FA code
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "403":
        description: Email not verified
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "404":
        description: User not found
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "429":
        description: Too many 2FA attempts
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/user/verify-email/{token}:
  get:
    summary: Verify user email via token link
    tags:
      - Users
    parameters:
      - in: path
        name: token
        required: true
        schema:
          type: string
        description: Email verification token sent to user's email
    responses:
      "201":
        description: Email verified successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Email Verified Successfully!!!"
      "400":
        description: Invalid or expired token
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/user/resend-verification:
  post:
    summary: Resend email verification link
    tags:
      - Users
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
            properties:
              email:
                type: string
                format: email
                example: "john@example.com"
    responses:
      "200":
        description: Verification email resent
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
      "400":
        description: Email already verified
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "404":
        description: User not found
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "429":
        description: Verification email already sent recently
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/user/forgot-password:
  post:
    summary: Request a password reset email
    tags:
      - Users
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
            properties:
              email:
                type: string
                format: email
                example: "john@example.com"
