        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "429":
        description: Reset email already sent recently
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/user/reset-password/{token}:
  post:
    summary: Reset password using token from email
    tags:
      - Users
    parameters:
      - in: path
        name: token
        required: true
        schema:
          type: string
        description: Password reset token from email link
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - password
            properties:
              password:
                type: string
                example: "NewStrongPass@123"
    responses:
      "200":
        description: Password reset successful
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
      "400":
        description: Invalid or expired token
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/user/get-profile:
  get:
    summary: Get authenticated user's profile
    tags:
      - Users
    security:
      - bearerAuth: []
    responses:
      "200":
        description: User profile data
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                user:
                  $ref: '../schemas/user.schema.yaml#/User'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "404":
        description: User not found
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

/user/update-profile:
  patch:
    summary: Update authenticated user's profile
    tags:
      - Users
    security:
      - bearerAuth: []
    requestBody:
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              name:
                type: string
              phone:
                type: string
              address:
                type: string
                description: JSON string with Location, City, State
              dob:
                type: string
              gender:
                type: string
              image:
                type: string
                format: binary
    responses:
      "200":
        description: Profile updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.schema.yaml#/ErrorResponse'

