openapi: 3.0.0

info:
  title: LawBridge API
  description: API documentation for LawBridge backend
  version: 1.0.0

servers:
  - url: http://localhost:3000/api

tags:
  - name: Auth
    description: User token refresh and logout
  - name: Users
    description: User registration, login, profile, and account management
  - name: Lawyers
    description: Lawyer login, profile, and availability management
  - name: Admin
    description: Admin-only operations for managing lawyers and appointments
  - name: Appointments
    description: Booking, listing, cancelling, and paying for appointments
  - name: Documents
    description: Upload and manage legal documents for AI analysis
  - name: Chat
    description: AI legal chatbot session management
  - name: Messages
    description: Sending messages to the RAG chatbot
  - name: Video
    description: Video call token generation and status management

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "An error occurred"
    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        image:
          type: string
          format: uri
        phone:
          type: string
        address:
          type: object
          properties:
            Location:
              type: string
            City:
              type: string
            State:
              type: string
        gender:
          type: string
        dob:
          type: string
        emailVerified:
          type: boolean
        twoFactorEnabled:
          type: boolean
        credits:
          type: object
          properties:
            dailyLimit:
              type: integer
            remaining:
              type: integer
    Lawyer:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        image:
          type: string
          format: uri
        speciality:
          type: string
        degree:
          type: string
        experience:
          type: string
        about:
          type: string
        available:
          type: boolean
        fees:
          type: number
        address:
          type: object
          properties:
            Location:
              type: string
            City:
              type: string
            State:
              type: string
        slots_booked:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    Appointment:
      type: object
      properties:
        id:
          type: string
        slotDate:
          type: string
          example: "20_06_2025"
        slotTime:
          type: string
          example: "10:00 am"
        amount:
          type: number
        payment:
          type: boolean
        isCompleted:
          type: boolean
        cancelled:
          type: string
          enum: ["Not Cancelled", "Cancelled by User", "Cancelled by Lawyer", "Cancelled by Admin"]
        createdAt:
          type: string
          format: date-time
        videoCall:
          type: object
          nullable: true
          properties:
            status:
              type: string
              enum: ["not_started", "in_progress", "completed", "missed"]
            duration:
              type: integer
            startedAt:
              type: string
              format: date-time
              nullable: true
            endedAt:
              type: string
              format: date-time
              nullable: true
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            image:
              type: string
              nullable: true
        lawyer:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            speciality:
              type: string
              nullable: true
            image:
              type: string
              nullable: true

paths:

  # ─── Auth ───────────────────────────────────────────────────────────────────

  /auth/logout:
    post:
      summary: Logout user (clears refresh token cookie)
      tags: [Auth]
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Logged out successfully"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      summary: Refresh user access token using refresh token cookie
      tags: [Auth]
      responses:
        "200":
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  accessToken:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        "401":
          description: Refresh token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── Users ──────────────────────────────────────────────────────────────────

  /user/signup:
    post:
      summary: Register a new user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: "John Doe"
                email:
                  type: string
                  format: email
                password:
                  type: string
                  example: "StrongPass@123"
      responses:
        "201":
          description: Signup successful, verification email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/login:
    post:
      summary: Login user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                twoFactorCode:
                  type: string
                  description: Required only if 2FA is enabled
                  example: "123456"
      responses:
        "200":
          description: Login successful or 2FA required
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  accessToken:
                    type: string
                  requires2FA:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/User'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Invalid password or 2FA code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Email not verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "429":
          description: Too many 2FA attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/verify-email/{token}:
    get:
      summary: Verify user email via token link
      tags: [Users]
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Email verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/resend-verification:
    post:
      summary: Resend email verification link
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Verification email resent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          description: Email already verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "429":
          description: Verification email already sent recently
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/forgot-password:
    post:
      summary: Request a password reset email
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Reset email sent (or silently ignored if user not found)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "429":
          description: Reset email already sent recently
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/reset-password/{token}:
    post:
      summary: Reset password using token from email
      tags: [Users]
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  example: "NewStrongPass@123"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/get-profile:
    get:
      summary: Get authenticated user's profile
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/User'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/update-profile:
    patch:
      summary: Update authenticated user's profile
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                phone:
                  type: string
                address:
                  type: string
                  description: JSON string with Location, City, State
                dob:
                  type: string
                gender:
                  type: string
                image:
                  type: string
                  format: binary
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/delete-account/request:
    post:
      summary: Request account deletion OTP
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OTP sent to email
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "429":
          description: OTP already sent recently
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/delete-account/verify:
    post:
      summary: Verify OTP and permanently delete account
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otp]
              properties:
                otp:
                  type: string
                  example: "482910"
      responses:
        "200":
          description: Account deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/2fa/setup:
    post:
      summary: Initiate 2FA setup — returns QR code and manual key
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: QR code and manual key returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  qrCode:
                    type: string
                    description: Base64 data URL of QR code image
                  manualKey:
                    type: string
                    description: Base32 secret for manual entry
        "400":
          description: 2FA already enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/2fa/verify:
    post:
      summary: Verify TOTP code and enable 2FA
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: 2FA enabled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          description: Invalid code or 2FA already enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/2fa/disable:
    post:
      summary: Disable 2FA (requires password and current TOTP code)
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, twoFactorCode]
              properties:
                password:
                  type: string
                twoFactorCode:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: 2FA disabled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          description: 2FA not enabled or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Invalid password or 2FA code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── Appointments ────────────────────────────────────────────────────────────

  /user/book-appointment:
    post:
      summary: Book an appointment with a lawyer
      tags: [Appointments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lawyerId, slotDate, slotTime]
              properties:
                lawyerId:
                  type: string
                  example: "64f1a2b3c4d5e6f7a8b9c0d2"
                slotDate:
                  type: string
                  example: "20_06_2025"
                slotTime:
                  type: string
                  example: "10:00 am"
      responses:
        "201":
          description: Appointment booked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          description: Slot not available or lawyer unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Lawyer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/appointments:
    get:
      summary: List all appointments for the authenticated user
      tags: [Appointments]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of user appointments
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  appointments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Appointment'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/cancel-appointment:
    post:
      summary: Cancel a user's own appointment
      tags: [Appointments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [appointmentId]
              properties:
                appointmentId:
                  type: string
      responses:
        "200":
          description: Appointment cancelled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "400":
          description: Already cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden — not the appointment owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Appointment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/payment-razorpay:
    post:
      summary: Create a Razorpay order for appointment payment
      tags: [Appointments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [appointmentId]
              properties:
                appointmentId:
                  type: string
      responses:
        "200":
          description: Razorpay order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  order:
                    type: object
                    description: Razorpay order object
        "400":
          description: Appointment cancelled or not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/verify-razorpay:
    post:
      summary: Verify Razorpay payment signature and mark appointment as paid
      tags: [Appointments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [razorpay_order_id, razorpay_payment_id, razorpay_signature]
              properties:
                razorpay_order_id:
                  type: string
                razorpay_payment_id:
                  type: string
                razorpay_signature:
                  type: string
      responses:
        "200":
          description: Payment verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "Payment Successful"
        "400":
          description: Invalid signature or missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Payment verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── Lawyers ─────────────────────────────────────────────────────────────────

  /lawyer/login:
    post:
      summary: Lawyer login
      tags: [Lawyers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Lawyer logged in successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  accessToken:
                    type: string
                  lawyer:
